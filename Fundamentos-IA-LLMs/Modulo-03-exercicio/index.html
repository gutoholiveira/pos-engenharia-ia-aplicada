<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Recomendação de Compras para Restaurantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="main">
        <h1>Sistema de Recomendação de Compras para Restaurantes</h1>

        <div class="row mt-3">
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header">
                        <h4>Perfil do Restaurante</h4>
                    </div>
                    <div class="card-body">
                        <form id="restaurantForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="restaurantSelect" class="form-label">Selecionar Restaurante</label>
                                    <select class="form-select" id="restaurantSelect">
                                        <option value="">-- Selecione um restaurante --</option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="restaurantCapacity" class="form-label">Capacidade</label>
                                    <input type="number" class="form-control" id="restaurantCapacity" disabled>
                                </div>
                            </div>
                        </form>

                        <div id="pastConsumptionContainer" class="mt-4">
                            <h5>Consumo Histórico</h5>
                            <div id="pastConsumptionList" class="row"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header">
                        <h4>Treinamento do Modelo</h4>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="model-controls d-flex gap-2">
                                <button id="trainModelBtn" class="btn btn-primary train-model-btn">
                                    <i class="bi bi-cpu"></i> Treinar Modelo
                                </button>
                                <button disabled id="runPredictionBtn" class="btn btn-success train-model-btn">
                                    <i class="bi bi-graph-up"></i> Prever Quantidades
                                </button>
                            </div>
                        </div>


                        <div class="all-restaurants-consumption">
                            <h5 id="consumptionDiv" style="cursor: pointer;">
                                Dados de Consumo de Todos os Restaurantes
                                <i id="consumptionArrow" class="bi bi-chevron-down"></i>
                            </h5>
                            <div id="allRestaurantsConsumptionList" class="restaurant-consumption-data overflow-auto"
                                style="max-height: 400px;display: none;">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="">Ingredientes</h3>
        <div class="row" id="ingredientList">
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis@1.5.1/dist/tfjs-vis.umd.min.js"></script>
    <script type="module" src="./src/index.js"></script>
</body>

</html>
