<div class="col-md-3">
    <div class="card ingredient-card">
        <div class="card-body">
            <h5 class="card-title">{{name}}</h5>
            <h6 class="card-subtitle mb-2 text-muted">{{category}}</h6>
            <p class="card-text">
                <strong>Preço Médio:</strong> R$ {{averagePrice}}<br>
                <strong>Unidade:</strong> {{unit}}<br>
            </p>
            <div class="mb-2">
                <label for="quantity-{{id}}" class="form-label small">Quantidade:</label>
                <input type="number" class="form-control form-control-sm quantity-input" id="quantity-{{id}}" placeholder="0" min="0" step="0.1">
            </div>
            <div class="mb-2">
                <label for="month-{{id}}" class="form-label small">Mês (YYYY-MM):</label>
                <input type="month" class="form-control form-control-sm month-input" id="month-{{id}}" value="{{month}}">
            </div>
            <button class="btn btn-primary add-consumption-btn" data-ingredient='{{ingredient}}'>Adicionar Consumo</button>
        </div>
    </div>
</div>
